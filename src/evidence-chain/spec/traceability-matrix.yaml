# Evidence Chain Engine — Traceability Matrix (R2)
# Spec §2. Maps every spec requirement to implementation file + test.
# Format: requirement_id → { description, implemented_in, test_covers, status }
#
# Section references below use the SECTION banners and exact describe/test names
# in src/evidence-chain/engine.test.ts. They were re-synced to the source on
# 2026-06-23 (the v2.0 matrix cited stale section numbers and a red-team-report.md
# that never existed). R11 (A6 trust-root fix) and R12 (performance) added in v2.1.

schema_version: "2.1"
generated: "2026-06-23"

requirements:

  R1:
    description: >
      TLA+ formal specification of the core invariants and valid transition
      graph. Must be model-checkable with TLC.
    implemented_in:
      - src/evidence-chain/spec/EvidenceChain.tla
      - src/evidence-chain/spec/EvidenceChain.cfg
    test_covers: []
    model_check_results: src/evidence-chain/spec/TLC_RESULTS.md
    # TLC ran clean (no error, no deadlock) at the committed scope (Claims=2,
    # Operators=2 → 484 distinct states) and was re-confirmed 2026-06-23 across
    # Claims=2..5 / Operators=2..3 up to 644,204 distinct states. The reachable
    # state space follows the exact closed form |States| = 11^C * 2^P
    # (see docs/PERFORMANCE.md). Invariants held at every scope.
    status: VERIFIED_BY_TLC

  R2:
    description: >
      Traceability matrix (this file) mapping every spec requirement to
      implementation and test.
    implemented_in:
      - src/evidence-chain/spec/traceability-matrix.yaml
    test_covers: []
    status: COMPLETE

  R3:
    description: >
      TypeScript reference implementation with full type safety (Claim,
      TruthState, EvidenceKind, TransitionRecord, ConstitutionRule,
      EvidenceChain, EvidenceItem, OperatorKey). Property-based tests
      using fast-check covering the six core invariants.
    implemented_in:
      - src/evidence-chain/types.ts       # all core types
      - src/evidence-chain/engine.ts      # EvidenceChainEngine
      - src/evidence-chain/crypto.ts      # Ed25519 + Merkle + key fingerprint
      - src/evidence-chain/ledger.ts      # append-only ledger
      - src/evidence-chain/rules.ts       # ConstitutionRule store
      - src/evidence-chain/signatures.ts  # OperatorKeyring
      - src/evidence-chain/index.ts       # public API re-exports
    test_covers:   # engine.test.ts SECTION 7 — Property-based (fast-check)
      - 'Property-based: Invariant 1 — no transition from terminal states'
      - 'Property-based: Invariant 2 — only valid forward transitions allowed'
      - 'Property-based: Invariant 3 — monotone truth-state'
      - 'Property-based: Invariant 4 — HITL requires valid signature (R8)'
      - 'Property-based: Invariant 5 — integrity hash changes with every mutation'
      - 'Property-based: Invariant 6 — unknown claim always throws on access'
    status: COMPLETE

  R4:
    description: >
      100% branch coverage CI gate enforced by c8. Coverage report generated
      with --reporter=json-summary. All branches must be green before merge.
    implemented_in:
      - tsconfig.evidence.json
    test_covers:
      - All 87 tests in src/evidence-chain/engine.test.ts
    coverage_achieved:
      statements: "100%"
      branches: "100%"
      functions: "100%"
      lines: "100%"
    run_command: >
      node_modules/.bin/c8
        --include='src/evidence-chain/*.ts'
        --exclude='src/evidence-chain/*.test.ts'
        --reporter=text --reporter=json-summary
        node --import tsx/esm --test src/evidence-chain/engine.test.ts
    note: >
      c8 honors the /* c8 ignore */ guards on genuinely-unreachable defensive
      branches. Node's built-in --experimental-test-coverage (which ignores those
      guards) reports 100% on every line outside those guarded blocks.
    status: COMPLETE

  R5:
    description: >
      Empirical validation: at least three real TLC claims advanced through
      the full pipeline from PROPOSED to VALIDATED, with real evidence items
      attached. Claims must match actual governed-investigation module content.
    implemented_in:
      - src/evidence-chain/validation/empirical-run.ts
    test_covers:
      - src/evidence-chain/validation/empirical-results.json
    status: COMPLETE

  R6:
    description: >
      Red-team report: all known bypass attempts documented, each attempt
      executed against the running engine with pass/fail result recorded.
      No bypass may succeed. v2.1 adds A10 (trust-root substitution) and
      A11 (tail truncation) — see R11 and docs/SECURITY-A6-DISCLOSURE.md.
    implemented_in:
      - src/evidence-chain/validation/red-team-run.ts      # A1–A11 runner
      - src/evidence-chain/validation/red-team-report.json # latest run output (allBlocked: true)
      - docs/SECURITY-A6-DISCLOSURE.md                     # A6 disclosure + fix
    test_covers:   # engine.test.ts SECTION 8 — Red-team bypass attempts
      - 'Red-team: claim without binding evidence (R6.1)'
      - 'Red-team: tampered evidence hash (R6.2)'
      - 'Red-team: impersonating a human reviewer (R6.3)'
      - 'Red-team: simulated trace as validation evidence (R6.4)'
      - 'Red-team: revoked operator cannot submit HITL (R6.5)'
      - 'Red-team: skipping states in sequence (R6.6)'
    runner_vectors: 11   # A1–A11, all BLOCKED
    status: COMPLETE

  R7:
    description: >
      Cryptographic integrity: Ed25519 signatures on every ledger entry,
      SHA-256 hash chain linkage, Merkle root over all entry hashes,
      inclusion proofs with sibling paths, and full tamper-evidence
      verification via verifyIntegrityHash().
    implemented_in:
      - src/evidence-chain/crypto.ts
      - src/evidence-chain/ledger.ts
    test_covers:   # engine.test.ts SECTION 5 (crypto) + SECTIONS 9/11 (ledger tamper)
      - 'verifyIntegrityHash passes on an unmodified chain'
      - 'integrityHash is a 64-char hex string (Merkle root)'
      - 'Merkle root changes after binding evidence'
      - 'inclusion proofs verify (R7)'
      - 'wrong leaf fails inclusion proof'
      - 'verify detects entry_hash mismatch (tampered content)'
      - 'detect prev_hash mismatch (reordered entries)'
      - 'verify fails when signature is altered on a valid entry'
    status: COMPLETE

  R8:
    description: >
      HITL (Human-in-the-Loop) evidence items must carry an Ed25519 signature
      verified against the operator keyring. Unregistered or revoked operator
      keys must be rejected. Re-registration is allowed after revocation.
    implemented_in:
      - src/evidence-chain/signatures.ts  # OperatorKeyring
      - src/evidence-chain/engine.ts      # bindEvidence HITL verification path
      - src/evidence-chain/crypto.ts      # verifySignature + createHITLSignature
    test_covers:   # engine.test.ts SECTION 3 (binding) + SECTION 9 (keyring internals)
      - 'HITL without signature is rejected (R8)'
      - 'HITL with invalid signature is rejected (R8)'
      - 'HITL from unregistered operator is rejected (R8)'
      - 'HITL from revoked operator is rejected (R8)'
      - 'valid HITL binds successfully (R8)'
      - 'register throws if operator already active'
      - 're-register is allowed after revocation'
      - 'OperatorKeyring persists and reloads keys'
    status: COMPLETE

  R9:
    description: >
      ConstitutionRule versioning with semver. When a rule is updated, all
      non-terminal claims under the old version are migrated: MAINTAINED if
      still compliant, REVIEW_REQUIRED if stricter. MigrationRecord persists
      to ledger.
    implemented_in:
      - src/evidence-chain/rules.ts       # RuleStore + migrateClaimToNewRule
      - src/evidence-chain/engine.ts      # migrateRules() orchestration
    test_covers:   # engine.test.ts SECTION 4 (enforcement) + SECTION 9 (RuleStore internals)
      - 'rule version migration produces MigrationRecord (R9)'
      - 'getVersion retrieves specific version'
      - 'RuleStore persists and reloads rules'
      - 'migrateClaimToNewRule returns REVIEW_REQUIRED when new rule is stricter'
      - 'migrateClaimToNewRule returns MAINTAINED when claim satisfies new rule'
    status: COMPLETE

  R10:
    description: >
      Operational attestation gate: transitions to VALIDATED are blocked when
      the applicable ConstitutionRule has requireOperationalAttestation=true
      unless at least one HITL evidence item with a valid signature is present
      in the chain.
    implemented_in:
      - src/evidence-chain/engine.ts      # advance() — VALIDATED gate
    test_covers:   # engine.test.ts SECTION 4 (enforcement) + SECTION 1 (lifecycle)
      - 'VALIDATED blocked when operational attestation required but absent (R10)'
      - 'VERIFIED → VALIDATED (with HITL + operational attestation)'
      - 'VALIDATED → DEPLOYED'
    status: COMPLETE

  R11:
    description: >
      A6 fix — out-of-band trust anchoring. Each entry binds its signer-key
      fingerprint (SHA-256 of SPKI/DER) inside the signed payload; verify()
      accepts a pinned signer fingerprint and a pinned chain head (length +
      Merkle root). This closes "signature forgery via file edit" (a file-system
      adversary who re-signs forged content under a substituted key) and tail
      truncation/rollback. See docs/SECURITY-A6-DISCLOSURE.md.
    implemented_in:
      - src/evidence-chain/crypto.ts      # keyFingerprint()
      - src/evidence-chain/ledger.ts      # signer binding, VerifyOptions, head()
      - src/evidence-chain/engine.ts      # signerFingerprint(), chainHead(), verify opts; audit-bundle anchor
    test_covers:   # engine.test.ts SECTION 12 — A6 hardening
      - 'keyFingerprint is deterministic per key and differs across keys'
      - 'verify with the correct pinned fingerprint passes'
      - 'verify with a wrong pinned fingerprint is rejected (substituted key)'
      - 'verify with the correct head pin passes'
      - 'verify rejects a wrong head length (truncation)'
      - 'verify rejects a wrong head Merkle root'
      - 'a second engine with a different key rejects the ledger (signer mismatch)'
      - 'forged + re-signed + key-swapped chain: unpinned ok=true, pinned ok=false'
      - 'exportAuditBundle includes signerFingerprint + head'
    red_team_vectors:
      - 'A10 — Trust-root key substitution (file edit + re-sign + key swap)'
      - 'A11 — Tail truncation / rollback (delete last entry)'
    status: COMPLETE

  R12:
    description: >
      Performance & scaling characterization (answers the review's "how does it
      scale?"). Append is O(1) per entry (v2.1 tail-hash cache; previously
      O(n) per entry → O(n^2) bulk); full verify is O(n); Merkle root is O(n);
      inclusion-proof VERIFICATION is O(log n) for sublinear membership audit.
      The TLA+ reachable state space is the closed form 11^C * 2^P.
    implemented_in:
      - src/evidence-chain/validation/bench.ts   # append/verify/merkle/inclusion benchmark
      - src/evidence-chain/ledger.ts             # O(1) tail-hash cache
    test_covers:
      - src/evidence-chain/validation/bench-results.json
      - docs/PERFORMANCE.md
    status: COMPLETE
