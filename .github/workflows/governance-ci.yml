name: TLC Governance CI

# Governance as infrastructure: every push/PR re-runs the verification stack —
# TLC-SL invariant model-checking, the test suites, evidence-chain verification,
# and a no-drift check that the generated artifacts still match the specs.
# Zero runtime dependencies: nothing here needs `npm install`.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    name: Verify (invariants, tests, evidence, no-drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: TLC-SL — model-check all invariants (in-process exhaustive checker)
        run: node tlc-sl/src/compile.mjs --target check

      - name: TLC-SL test suite
        run: node --test tlc-sl/tests/*.test.mjs

      - name: Evidence-chain test suite (Ed25519 + Merkle)
        run: node --test src/core/evidence-chain.test.mjs

      - name: Probe-gate test suite (INV-PROBE-001)
        run: node --test probe-gate/tests/*.test.mjs

      - name: Cross-layer governance integration tests
        run: node --test tests/integration/*.test.mjs

      - name: Platform check — multiple constitutions through one runtime
        run: node constitutions/check-platform.mjs

      - name: Verify the signed TLC-SL evidence against its committed public key
        run: node src/core/evidence-chain.mjs verify evidence/TLC-SL/verification.signed.jsonl evidence/TLC-SL/evidence-public-key.pem

      - name: No-drift — regenerate targets and fail if they differ from what's committed
        run: |
          node tlc-sl/src/compile.mjs --target all --quiet
          node tlc-sl/src/compile.mjs constitutions/instructional-integrity/spec --target all --out constitutions/instructional-integrity --quiet
          if ! git diff --quiet -- tlc-sl/generated constitutions/instructional-integrity/generated; then
            echo "::error::Generated constitution targets are out of date. Run 'npm run tlc:sl:compile' (and the instructional --out compile) and commit."
            git --no-pager diff --stat -- tlc-sl/generated constitutions/instructional-integrity/generated
            exit 1
          fi
          echo "Generated targets match the specs."

  tlc-model-check:
    name: TLA+ model-check with TLC
    runs-on: ubuntu-latest
    # Required gate: TLC confirmed "No error" on all emitted modules on the first run
    # (TLC Governance CI run #2, sha 6d51120). A TLC violation now fails the build.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Regenerate TLA+ modules from the specs
        run: node tlc-sl/src/compile.mjs --target tla --quiet

      - name: Download the TLC model checker
        run: curl -fsSL -o tla2tools.jar https://github.com/tlaplus/tlaplus/releases/download/v1.8.0/tla2tools.jar

      - name: Run TLC on every generated TLA+ module
        run: |
          set -e
          fail=0
          for tla in tlc-sl/generated/tla/*.tla; do
            cfg="${tla%.tla}.cfg"
            echo "=== TLC: $tla ==="
            # -deadlock: our properties are safety invariants, not deadlock-freedom.
            if ! java -cp tla2tools.jar tlc2.TLC -deadlock -config "$cfg" "$tla"; then
              echo "::warning::TLC reported an issue for $tla"
              fail=1
            fi
          done
          exit $fail
